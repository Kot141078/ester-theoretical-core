name: Unit and regression tests
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: releases/esther-rp-001-v0.8.1/executable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python -m pip install -r requirements-v0.8.txt
      - name: v0.8 tests
        env:
          PYTHONPATH: CODE
        run: python -m pytest -q -W error -p no:cacheprovider TESTS
      - name: legacy v0.7 tests
        env:
          PYTHONPATH: LEGACY_V07/CODE
        run: python -m pytest -q -W error -p no:cacheprovider LEGACY_V07/TESTS
